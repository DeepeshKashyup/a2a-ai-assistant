name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run lint
        run: make lint

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: make test

  smoke-logging:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run logging smoke test
        run: make smoke-logging

  bump-version:
    runs-on: ubuntu-latest
    needs: smoke-logging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read current version and create tag
        id: tag
        run: |
          FILE="app/core/config.py"
          CURRENT=$(grep -oP '(?<=app_version: str = ")[^"]+' "$FILE")
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v$CURRENT"
          git push origin "v$CURRENT"

      - name: Bump patch version in config.py
        id: bump
        run: |
          FILE="app/core/config.py"
          CURRENT=${{ steps.tag.outputs.version }}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          sed -i "s/app_version: str = \"$CURRENT\"/app_version: str = \"$NEW\"/" "$FILE"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"

      - name: Commit and push bumped version
        run: |
          git add app/core/config.py
          git commit -m "chore: bump version ${{ steps.tag.outputs.version }} → ${{ steps.bump.outputs.new }} [skip ci]"
          git push
